<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Human Mouse Drift</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f1e8;
        --panel: rgba(255, 252, 245, 0.92);
        --text: #1f1b16;
        --muted: #6c6256;
        --accent: #c45b35;
        --accent-strong: #9f4321;
        --border: rgba(31, 27, 22, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(196, 91, 53, 0.18), transparent 42%),
          linear-gradient(160deg, #fbf6ed 0%, var(--bg) 100%);
        color: var(--text);
      }

      .panel {
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 16px;
        background: var(--panel);
        backdrop-filter: blur(10px);
        box-shadow: 0 18px 36px rgba(88, 61, 39, 0.12);
      }

      h1 {
        margin: 0 0 6px;
        font-size: 18px;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .controls {
        display: grid;
        gap: 14px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 13px;
        font-weight: 600;
      }

      .value {
        color: var(--accent-strong);
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 4px;
      }

      button {
        border: 0;
        border-radius: 12px;
        padding: 10px 12px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        transition: transform 120ms ease, opacity 120ms ease, background 120ms ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:active {
        transform: translateY(0);
      }

      .start {
        background: var(--accent);
        color: #fffaf4;
      }

      .stop {
        background: rgba(31, 27, 22, 0.08);
        color: var(--text);
      }

      .status {
        margin-top: 14px;
        min-height: 18px;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>Human Mouse Drift</h1>
      <p>Dispatches gentle in-page <code>mousemove</code> events without touching the real cursor.</p>

      <div class="controls">
        <label class="field" for="speed">
          <span class="field-header">
            <span>Speed</span>
            <span class="value" id="speedValue">Medium</span>
          </span>
          <input id="speed" type="range" min="0" max="2" step="1" value="1" />
        </label>

        <label class="field" for="intensity">
          <span class="field-header">
            <span>Intensity</span>
            <span class="value" id="intensityValue">Low</span>
          </span>
          <input id="intensity" type="range" min="0" max="2" step="1" value="0" />
        </label>

        <div class="actions">
          <button class="start" id="startButton" type="button">Start</button>
          <button class="stop" id="stopButton" type="button">Stop</button>
        </div>
      </div>

      <div class="status" id="status">Idle on the current tab.</div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
